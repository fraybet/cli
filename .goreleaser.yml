# GoReleaser builds the cross-platform fray + fray-mcp binaries, publishes a
# GitHub Release with archives + checksums (consumed by install.sh and the npm
# package), and pushes a Homebrew formula to fraybet/homebrew-tap.
#
#   git tag v0.1.0 && git push origin v0.1.0   # the release workflow does the rest
version: 2

project_name: fray

# Output to a separate dir: the repo's committed dist/ holds the install script +
# npm package (source), and `release --clean` would otherwise wipe them and fail
# with "git is in a dirty state".
dist: .goreleaser-out

builds:
  - id: fray
    main: ./cmd/fray
    binary: fray
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}
  - id: fray-mcp
    main: ./cmd/fray-mcp
    binary: fray-mcp
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - id: fray
    ids: [fray, fray-mcp]
    name_template: "fray_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: fraybet
    name: cli

# Homebrew tap. goreleaser pushes the formula cross-repo to fraybet/homebrew-tap
# (created), authenticated by the HOMEBREW_TAP_GITHUB_TOKEN env in release.yml —
# set the HOMEBREW_TAP_TOKEN secret to a PAT with contents:write on the tap repo.
brews:
  - name: fray
    repository:
      owner: fraybet
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://fray.bet"
    description: "Agent-first, non-custodial betting CLI for Fray"
    license: "MIT"
    install: |
      bin.install "fray"
      bin.install "fray-mcp"
    test: |
      system "#{bin}/fray", "version"
